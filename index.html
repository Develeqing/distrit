<script>

let productoActual = null;

function abrirProducto(id) {
  const producto = productos.find(p => p.id === id);
  if (!producto) return;

  productoActual = producto;

  const modal = document.getElementById("productModal");

  document.getElementById("modalImg").src = producto.imagen;
  document.getElementById("modalNombre").textContent = producto.nombre;
  document.getElementById("modalPrecio").textContent = "$" + producto.precio;

  modal.classList.add("active");

  document.getElementById("addCartBtn").onclick = function () {
    agregarAlCarrito(producto.id);
  };
}

function cerrarProducto() {
  document.getElementById("productModal").classList.remove("active");
}

function cerrarProducto() {
  document.getElementById("productModal").classList.remove("active");
}

function cerrarProducto() {
  document.getElementById("productModal").classList.add("hidden");
}

  document.addEventListener("click", function(event) {
  const modal = document.getElementById("authModal");
  const box = document.querySelector(".auth-box");

  if (!modal || !box) return;

  if (modal.classList.contains("active")) {
    if (!box.contains(event.target)) {
      cerrarLogin();
    }
  }
});

  function cerrarLogin() {
  document.getElementById("authModal").classList.remove("active");
}

  document.addEventListener("click", function(event) {
  const auth = document.querySelector(".auth-box");
  const boton = document.querySelector("button[onclick='toggleAuth(event)']");

  if (!auth || !boton) return;

  if (auth.style.display === "flex") {
    if (!auth.contains(event.target) && !boton.contains(event.target)) {
      auth.style.display = "none";
    }
  }
});

  function toggleAuth(event) {
  event.stopPropagation();

  const loader = document.getElementById("loader");
  const modal = document.getElementById("authModal");

  // mostrar loader
  loader.classList.remove("hidden");

  setTimeout(() => {
    loader.classList.add("hidden");
    modal.classList.add("active");
  }, 1000);
}

  function registrar() {
  const nombre = document.getElementById("nombre").value;
  const correo = document.getElementById("correo").value;
  const password = document.getElementById("password").value;

  if (!nombre || !correo || !password) {
    document.getElementById("mensajeAuth").textContent = "Completa todos los campos";
    return;
  }

  const usuario = {
    nombre,
    correo,
    password
  };

  localStorage.setItem("usuario", JSON.stringify(usuario));

  document.getElementById("mensajeAuth").textContent = "Registrado correctamente ✅";
}

  function login() {
  const correo = document.getElementById("correo").value;
  const password = document.getElementById("password").value;

  const usuarioGuardado = JSON.parse(localStorage.getItem("usuario"));

  if (!usuarioGuardado) {
    document.getElementById("mensajeAuth").textContent = "No hay usuario registrado";
    return;
  }

  if (
    correo === usuarioGuardado.correo &&
    password === usuarioGuardado.password
  ) {
    document.getElementById("mensajeAuth").textContent = "Bienvenido " + usuarioGuardado.nombre;

    localStorage.setItem("sesionActiva", "true");
  } else {
    document.getElementById("mensajeAuth").textContent = "Datos incorrectos ❌";
  }
}

  function buscarProductos() {
  const texto = document.getElementById("buscador").value.toLowerCase();
  const contenedor = document.getElementById("lista-productos");

  contenedor.innerHTML = "";

  const filtrados = productos.filter(p => 
    p.nombre.toLowerCase().includes(texto) ||
    (p.descripcion && p.descripcion.toLowerCase().includes(texto))
  );

  filtrados.forEach((p, index) => {
    contenedor.innerHTML += `
      <div class="producto fade-in" style="animation-delay:${index * 0.1}s">
        <img src="${p.imagen}" alt="${p.nombre}">
        <h3>${p.nombre}</h3>
        <p class="descripcion">${p.descripcion || ""}</p>
        <p>$${p.precio}</p>
        <button onclick="abrirProducto(${p.id})">Ver producto</button>
      </div>
    `;
  });
}

  function seleccionarCategoria(categoria) {
  cerrarMenu(); // 🔥 cierra el menú
  filtrarProductos(categoria); // 🔥 carga productos
}

  window.onload = function() {
    const menu = document.querySelector(".menu-float");

  window.addEventListener("scroll", function () {
  const menu = document.querySelector(".menu-float");

  if (!menu) return;

  if (window.scrollY > 200) {
    menu.classList.add("show");
  } else {
    menu.classList.remove("show");
  }
});

    const sesion = localStorage.getItem("sesionActiva");

  if (sesion === "true") {
  document.getElementById("btnRegistrar").style.display = "none";
}

  if (sesion === "true") {
    const usuario = JSON.parse(localStorage.getItem("usuario"));
    document.getElementById("mensajeAuth").textContent =
      "Connected with: " + usuario.nombre;
  }
  document.getElementById("menuModal").classList.add("hidden");

  renderCarrito();
  document.getElementById("contador-carrito").textContent =
    carrito.reduce((acc, p) => acc + p.cantidad, 0);

  
};

  function abrirMenu(event) {
  event.stopPropagation();
  document.getElementById("menuModal").classList.add("active");
}

function cerrarMenu() {
  document.getElementById("menuModal").classList.remove("active");
}

/* cerrar al hacer click afuera */
document.addEventListener("click", function(event) {
  const modal = document.getElementById("menuModal");
  const box = document.querySelector(".menu-box");
  const boton = document.querySelector(".menu-btn");

  if (!modal || !box || !boton) return;

  if (!modal.classList.contains("hidden")) {
    if (
      !box.contains(event.target) &&
      !boton.contains(event.target)
    ) {
      cerrarMenu();
    }
  }
});

document.addEventListener("click", function(event) {
  const menu = document.getElementById("menuOpciones");
  const boton = document.querySelector(".menu-btn");

  if (!menu) return;

  if (!menu.classList.contains("hidden")) {
    if (!menu.contains(event.target) && !boton.contains(event.target)) {
      menu.classList.add("hidden");
    }
  }
});


  function filtrarProductos(categoria) {
  const loader = document.getElementById("loader");
  const contenedor = document.getElementById("lista-productos");

  // 🔥 mostrar loader
  loader.classList.remove("hidden");

  // 🔥 simular carga
  setTimeout(() => {
    contenedor.innerHTML = "";

    const filtrados = productos.filter(p => p.categoria === categoria);

    filtrados.forEach((p, index) => {
      contenedor.innerHTML += `
        <div class="producto fade-in" style="animation-delay:${index * 0.1}s">
          <img src="${p.imagen}" alt="${p.nombre}">
          <h3>${p.nombre}</h3>
          <p class="descripcion">${p.descripcion || ""}</p>
          <p>$${p.precio}</p>
          <button onclick="abrirProducto(${p.id})">Ver producto</button>
        </div>
      `;
    });

    // 🔥 ocultar loader
    loader.classList.add("hidden");

  }, 1500); // 1.5 segundos
}

  function eliminarProducto(id) {
  carrito = carrito.filter(p => p.id !== id);
  renderCarrito();
}

  function cerrarPromo() {
  const promo = document.getElementById("promoBubble");
  if (promo) {
    promo.style.display = "none";
  }
}
  const textoPromo = "ᴅɪsᴛʀɪᴛ ɪɴᴄᴏʀᴘᴏʀᴀᴛɪᴏɴ®";

  document.getElementById("promoTexto").textContent = textoPromo;
  const productos = [
  { 
    id: 1, 
    nombre: "Overzide", 
    precio: 59999, 
    imagen: "Calabera.png",
    descripcion: "100% Algodon, Distrit Incorporated.",
    categoria: "camisetas"
  },
  { 
    id: 2, 
    nombre: "Hoodie Black", 
    precio: 120000, 
    imagen: "Calabera.png",
    descripcion: "Hoodie premium",
    categoria: "hoodies"
  },
  { 
    id: 3, 
    nombre: "Gorra", 
    precio: 40000, 
    imagen: "Calabera.png",
    descripcion: "Accesorio streetwear",
    categoria: "accesorios"
  }
];

  let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

  function agregarAlCarrito(id) {
  const producto = productos.find(p => p.id === id);

  const existente = carrito.find(p => p.id === id);

  if (existente) {
    existente.cantidad += 1;
  } else {
    carrito.push({ ...producto, cantidad: 1 });
  }

  renderCarrito();
}

function cambiarCantidad(id, cambio) {
  const producto = carrito.find(p => p.id === id);

  if (producto) {
    producto.cantidad += cambio;

    if (producto.cantidad <= 0) {
      carrito = carrito.filter(p => p.id !== id);
    }

    renderCarrito();
  }
}

  function renderCarrito() {
  const lista = document.getElementById("items-carrito");
  const total = document.getElementById("total");

  lista.innerHTML = "";
  let suma = 0;

  carrito.forEach(p => {
    lista.innerHTML += `
      <li>
        ${p.nombre} 
        <button onclick="cambiarCantidad(${p.id}, -1)">➖</button>
        x${p.cantidad}
        <button onclick="cambiarCantidad(${p.id}, 1)">➕</button>
        - $${p.precio * p.cantidad}
        <button onclick="eliminarProducto(${p.id})">❌</button>
      </li>
    `;
    suma += p.precio * p.cantidad;
  });

  total.textContent = suma;

  const totalItems = carrito.reduce((acc, p) => acc + p.cantidad, 0);
  document.getElementById("contador-carrito").textContent = totalItems;

  // 🔥 GUARDAR AQUÍ (CORRECTO)
  localStorage.setItem("carrito", JSON.stringify(carrito));
}

  function toggleCarrito(event) {
  event.stopPropagation(); // 🔥 evita que el click se propague
  document.getElementById("carrito").classList.toggle("hidden");
}

document.addEventListener("click", function(event) {
  const carrito = document.getElementById("carrito");

  if (!carrito.classList.contains("hidden")) {
    if (!carrito.contains(event.target)) {
      carrito.classList.add("hidden");
    }
  }
});

function toggleSearch() {
  const box = document.querySelector(".search-box");
  const input = document.getElementById("buscador");

  box.classList.toggle("active");

  if (box.classList.contains("active")) {
    setTimeout(() => input.focus(), 200);
  } else {
    input.value = "";
    buscarProductos();
  }
}
